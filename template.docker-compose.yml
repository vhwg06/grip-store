services:
  grip-store-fe:
    image: ${REGISTRY_IMAGE}:${IMAGE_TAG}
    container_name: grip-store-fe
    restart: unless-stopped
    ports:
      - "${FE_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
