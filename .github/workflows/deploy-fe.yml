name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ghcr-push:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/grip-store-fe
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        run: echo "REGISTRY_IMAGE=$(echo "$REGISTRY_IMAGE" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          test -n "$NEXT_PUBLIC_API_URL"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            -t "$REGISTRY_IMAGE:$IMAGE_TAG" \
            -t "$REGISTRY_IMAGE:latest" .
          docker push "$REGISTRY_IMAGE:$IMAGE_TAG"
          docker push "$REGISTRY_IMAGE:latest"

      - name: Copy compose template to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          source: template.docker-compose.yml
          target: /tmp

      - name: Pull and run container on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          FE_PORT: ${{ secrets.FE_PORT || '3000' }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          envs: REGISTRY_IMAGE,IMAGE_TAG,FE_PORT,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            sudo mkdir -p /opt/grip-store-fe
            sudo cp /tmp/template.docker-compose.yml /opt/grip-store-fe/docker-compose.yml
            cd /opt/grip-store-fe
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            sudo REGISTRY_IMAGE="$REGISTRY_IMAGE" IMAGE_TAG="$IMAGE_TAG" FE_PORT="$FE_PORT" docker compose pull
            sudo REGISTRY_IMAGE="$REGISTRY_IMAGE" IMAGE_TAG="$IMAGE_TAG" FE_PORT="$FE_PORT" docker compose up -d --remove-orphans
            sudo docker ps --filter "name=grip-store-fe"
