server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://host.docker.internal:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/products/[^/]+/?$ {
    try_files $uri $uri.html /products/placeholder.html;
  }

  location ~ ^/buy/[^/]+/?$ {
    try_files $uri $uri.html /buy/placeholder.html;
  }

  location ~ ^/order/[^/]+/?$ {
    try_files $uri $uri.html /order/placeholder.html;
  }

  location ~ ^/callback/[^/]+/?$ {
    try_files $uri $uri.html /callback/placeholder.html;
  }

  location ~ ^/articles/[^/]+/?$ {
    try_files $uri $uri.html /articles/placeholder.html;
  }

  location ~ ^/admin/article/edit/[^/]+/?$ {
    try_files $uri $uri.html /admin/article/edit/placeholder.html;
  }

  location ~ ^/admin/product/edit/[^/]+/?$ {
    try_files $uri $uri.html /admin/product/edit/placeholder.html;
  }

  location ~ ^/admin/cards/[^/]+/?$ {
    try_files $uri $uri.html /admin/cards/placeholder.html;
  }

  location ~ ^/admin/orders/[^/]+/?$ {
    try_files $uri $uri.html /admin/orders/placeholder.html;
  }

  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  location /_next/static/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }
}
